# sysbeat nginx configuration
#
# setup.sh --install-nginx symlinks this file automatically.
# Manual install:
#   sudo ln -s /opt/sysbeat/nginx/sysbeat.conf /etc/nginx/sites-enabled/sysbeat
#   sudo nginx -t && sudo systemctl reload nginx

upstream sysbeat_backend {
    server 127.0.0.1:3000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Dashboard static files
    location / {
        root /opt/sysbeat/dashboard/dist;
        try_files $uri $uri/ /index.html;
    }

    # API routes
    location /api/ {
        proxy_pass http://sysbeat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /devices {
        proxy_pass http://sysbeat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://sysbeat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ingest {
        proxy_pass http://sysbeat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket
    location /stream {
        proxy_pass http://sysbeat_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
